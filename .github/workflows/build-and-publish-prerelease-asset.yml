name: Build, Publish and Release Teraslice Prerelease Asset
run-name: ${{ github.actor }} is building, publishing and releasing the Teraslice Prerelease Asset
on:
  workflow_dispatch:
  pull_request:
    branches:
      - release/chaos-assets-v*
    types:
      - closed

jobs:
  call-asset-build:
    if: github.event.pull_request.merged == true
    uses: terascope/workflows/.github/workflows/prerelease-asset-build-and-publish.yml@92c8f6b6312803300b0f36ba6b38d8007d7f471f
    secrets: inherit
