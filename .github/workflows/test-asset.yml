name: Test Teraslice Asset
run-name: ${{ github.actor }} is testing the Teraslice Asset
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/chaos-assets-v*'
  pull_request:
    branches:
      - main
      - 'release/chaos-assets-v*'

permissions: {}

jobs:
  call-asset-test-workflow:
    uses: terascope/workflows/.github/workflows/asset-test.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    with:
      teraslice-cli-version: ${{ (startsWith(github.ref, 'refs/heads/release/chaos-assets-v') || startsWith(github.base_ref, 'release/chaos-assets-v')) && 'prerelease' || 'latest' }}
    permissions:
      actions: read
      contents: read
      pull-requests: write
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
