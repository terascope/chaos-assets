name: Test Teraslice Asset
run-name: ${{ github.actor }} is testing the Teraslice Asset
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/chaos-assets-v*'
  pull_request:
    branches:
      - main
      - 'release/chaos-assets-v*'

permissions: {}

jobs:
  call-asset-test-workflow:
    uses: terascope/workflows/.github/workflows/asset-test.yml@d2864085b6d36798749fce3dd549dae10283f76a
    permissions:
      actions: read
      contents: read
      pull-requests: write
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
