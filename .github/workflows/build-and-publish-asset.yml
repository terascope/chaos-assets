name: Build, Publish and Release Teraslice Asset
run-name: ${{ github.actor }} is building, publishing and releasing the Teraslice Asset
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release/chaos-assets-v*
    types:
      - closed

permissions: {}

jobs:
  call-asset-build:
    if: github.event.pull_request.merged == true
    uses: terascope/workflows/.github/workflows/asset-build-and-publish.yml@d2864085b6d36798749fce3dd549dae10283f76a
    permissions:
      id-token: write  # Required for OIDC
      contents: read
      pages: write     # to deploy to Pages
    secrets:
      RELEASES_PRIVATE_KEY: ${{ secrets.RELEASES_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  call-prerelease-asset-build:
    if: github.event.pull_request.merged == true && startsWith(github.base_ref, 'release/chaos-assets-v')
    uses: terascope/workflows/.github/workflows/prerelease-asset-build-and-publish.yml@d2864085b6d36798749fce3dd549dae10283f76a
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    secrets:
      RELEASES_PRIVATE_KEY: ${{ secrets.RELEASES_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}